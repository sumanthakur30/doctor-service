# Production — JDBC via SPRING_DATASOURCE_* environment variables only (no secrets in git).
# Dedicated Flyway history table on a shared PostgreSQL DB (avoids version collisions with other services).
spring.flyway.table=flyway_schema_history_doctor
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
security.jwt.enforce=true
